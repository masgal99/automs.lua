<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON KEY // MASGAL HUB</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00aa;
            --dark: #0a0a1f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            margin: 0;
            font-family: 'Share Tech Mono', monospace;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            background: rgba(18, 18, 43, 0.95);
            padding: 35px 25px;
            border-radius: 15px;
            width: 95%;
            max-width: 620px;
            margin: 40px auto;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            text-align: center;
            font-size: 2.5rem;
            letter-spacing: 6px;
            text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-pink);
        }

        .subtitle { text-align: center; color: #aaa; letter-spacing: 4px; margin-bottom: 30px; }

        .header-key {
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid var(--neon-cyan);
            padding: 18px;
            margin: 25px 0;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
        }

        .label { color: var(--neon-pink); font-size: 0.95rem; }

        input, button {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
        }

        input {
            background: #1a1a2f;
            color: #fff;
            border: 1px solid #555;
            text-align: center;
            text-transform: uppercase;
        }

        button {
            background: linear-gradient(90deg, #00f3ff, #00ccaa);
            color: #000;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--neon-cyan); }

        .section {
            margin: 35px 0;
            padding: 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
        }

        .success { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .error { color: #ff3366; text-shadow: 0 0 10px #ff3366; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MASGAL HUB</h1>
        <p class="subtitle">NEON KEY SYSTEM v2.1</p>

        <div class="section">
            <h2 style="color:var(--neon-pink); text-align:center;">ADMIN TERMINAL</h2>
            <input type="password" id="adminPass" placeholder="ENTER ADMIN PASSWORD">
            <button onclick="checkAdminPassword()">LOGIN ADMIN</button>

            <div id="adminGenerate" class="hidden">
                <p style="color:var(--neon-cyan);">DURASI KEY (HARI):</p>
                <input type="number" id="days" value="30">
                <button onclick="generateKey()">GENERATE NEW KEY (MGKEY-XXXX-XXXX)</button>
                <div id="generatedKey"></div>

                <hr style="border-color:#444; margin:25px 0;">
                <h3 style="color:#ff00aa;">RESET / DELETE</h3>
                <input type="text" id="keyToDelete" placeholder="MGKEY-XXXX-XXXX" style="text-transform:uppercase;">
                <button onclick="deleteKey()" style="background:#ff3366;">DELETE KEY</button>
                <button onclick="resetHWID()" style="background:#ffaa00; margin-top:8px;">RESET HWID & DEVICES</button>
                <div id="deleteResult"></div>
            </div>
        </div>

        <hr>

        <div class="section">
            <h2 style="color:var(--neon-cyan); text-align:center;">KEY VERIFICATION</h2>
            <input type="text" id="userKey" placeholder="MASUKKAN KEY" maxlength="50" style="text-transform:uppercase;">
            <button onclick="verifyAndLoad()">VERIFY & COPY SCRIPT</button>
            
            <div id="keyHeader" class="header-key hidden">
                <div><span class="label">KEY :</span> <strong id="dispKey"></strong></div>
                <div><span class="label">EXPIRED :</span> <span id="dispExpire"></span></div>
                <div><span class="label">DEVICES :</span> <span id="dispDevices">0</span></div>
            </div>

            <div id="result"></div>
        </div>

        <p style="text-align:center; color:#666;">
            Total Executes : <strong id="totalUsers" style="color:var(--neon-cyan);">0</strong>
        </p>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCLAFJ169DIzqKDKl01TvWURrEOiHXOdvM",
          authDomain: "databasr-e6fa1.firebaseapp.com",
          databaseURL: "https://databasr-e6fa1-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "databasr-e6fa1",
          storageBucket: "databasr-e6fa1.firebasestorage.app",
          messagingSenderId: "772087175709",
          appId: "1:772087175709:web:ba7554bfabebe5e6dac4f4"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ADMIN_PASSWORD = "MASGALHUB";
        const ROBLOX_SCRIPT = `loadstring(game:HttpGet("https://raw.githubusercontent.com/masgal99/MasGal-Escuy/refs/heads/main/MG_SCRIPT"))()`;

        function getHWID() {
            let hwid = localStorage.getItem("roblox_hwid");
            if (!hwid) {
                hwid = "HWID-" + Math.random().toString(36).substring(2,15).toUpperCase() + Date.now().toString(36).toUpperCase().slice(-8);
                localStorage.setItem("roblox_hwid", hwid);
            }
            return hwid;
        }

        function checkAdminPassword() {
            if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
                document.getElementById("adminGenerate").classList.remove("hidden");
                document.getElementById("adminPass").style.display = "none";
                alert("✅ ADMIN ACCESS GRANTED");
            } else {
                alert("❌ ACCESS DENIED");
            }
        }

        // ================== GENERATE RANDOM 4 KARAKTER (Huruf + Angka) ==================
        function generateRandomPart() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let result = "";
            for (let i = 0; i < 4; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // ================== GENERATE KEY UTAMA ==================
        async function generateKey() {
            const days = parseInt(document.getElementById("days").value) || 30;
            const expireTime = Date.now() + (days * 24 * 60 * 60 * 1000);

            const part1 = generateRandomPart();
            const part2 = generateRandomPart();
            const key = `MGKEY-\( {part1}- \){part2}`;

            try {
                await db.ref('keys/' + key).set({
                    key: key,
                    expires: expireTime,
                    hwid: null,
                    devices: [],
                    createdAt: Date.now(),
                    used: false
                });

                // Tampilan Header Key yang Benar
                document.getElementById("generatedKey").innerHTML = `
                    <div class="header-key">
                        <div><span class="label">KEY :</span> <strong>${key}</strong></div>
                        <div><span class="label">EXPIRED :</span> ${new Date(expireTime).toLocaleDateString('id-ID')}</div>
                        <div><span class="label">DEVICES :</span> 0</div>
                    </div>
                    <p class="success" style="text-align:center; margin-top:15px; font-size:1.1rem;">
                        ✅ KEY BERHASIL DIBUAT!
                    </p>
                `;
            } catch (e) {
                document.getElementById("generatedKey").innerHTML = `<p class="error">Gagal membuat key: ${e.message}</p>`;
            }
        }

        async function deleteKey() {
            const key = document.getElementById("keyToDelete").value.trim().toUpperCase();
            if (!key) return alert("Masukkan key!");
            if (confirm(`YAKIN HAPUS KEY ${key}?`)) {
                await db.ref('keys/' + key).remove();
                document.getElementById("deleteResult").innerHTML = `<p class="success">Key ${key} telah dihapus</p>`;
            }
        }

        async function resetHWID() {
            const key = document.getElementById("keyToDelete").value.trim().toUpperCase();
            if (!key) return alert("Masukkan key!");
            await db.ref('keys/' + key).update({ hwid: null, devices: [] });
            document.getElementById("deleteResult").innerHTML = `<p class="success">HWID & Devices direset untuk ${key}</p>`;
        }

        async function verifyAndLoad() {
            const inputKey = document.getElementById("userKey").value.trim().toUpperCase();
            const resultDiv = document.getElementById("result");
            const headerDiv = document.getElementById("keyHeader");
            const hwid = getHWID();

            if (!inputKey) return resultDiv.innerHTML = `<p class="error">Masukkan key dulu!</p>`;

            resultDiv.innerHTML = `<p class="info">Sedang memverifikasi...</p>`;

            try {
                const snap = await db.ref('keys/' + inputKey).once('value');
                const data = snap.val();

                if (!data) return resultDiv.innerHTML = `<p class="error">Key tidak ditemukan!</p>`;
                if (Date.now() > data.expires) return resultDiv.innerHTML = `<p class="error">Key sudah expired!</p>`;

                let devices = data.devices || [];
                if (!devices.some(d => d.hwid === hwid)) {
                    devices.push({ hwid: hwid, addedAt: Date.now() });
                    await db.ref('keys/' + inputKey).update({ devices });
                }

                document.getElementById("dispKey").textContent = inputKey;
                document.getElementById("dispExpire").textContent = new Date(data.expires).toLocaleDateString('id-ID');
                document.getElementById("dispDevices").textContent = devices.length;
                headerDiv.classList.remove("hidden");

                await db.ref('stats/totalExecutes').transaction(curr => (curr || 0) + 1);

                navigator.clipboard.writeText(ROBLOX_SCRIPT).then(() => {
                    resultDiv.innerHTML = `<p class="success">✅ Key Valid! Script sudah dicopy ke clipboard.</p>`;
                });

            } catch (err) {
                resultDiv.innerHTML = `<p class="error">Error: ${err.message}</p>`;
            }
        }

        function loadStats() {
            db.ref('stats/totalExecutes').on('value', snap => {
                document.getElementById("totalUsers").textContent = snap.val() || 0;
            });
        }

        window.onload = loadStats;
    </script>
</body>
</html>
